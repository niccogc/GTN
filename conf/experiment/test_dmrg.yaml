# @package _global_
# GTN test experiment - evaluates best configs on test set

defaults:
  - test_base
  - override /trainer: dmrg

hydra:
  sweeper:
    params:
      # === Jitter Schedule (NTN-specific) ===
      trainer.ridge: 5            # Regularization strength (used directly as jitter)
      trainer.ridge_decay: 0.25       # Multiplicative decay per epoch
      trainer.ridge_min: 0.0001        # Minimum ridge value
