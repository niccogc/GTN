# @package _global_
defaults:
  - override /model: cmpo2
  - override /dataset: _mnist

model:
  L: 3
  n_patches: 4
  rank_pixel: 10
  rank_patch: 10
  init_strength: 0.01

dataset:
  batch_size: 512

skip_completed: false

hydra:
  sweeper:
    params:
      trainer: gtn, ntn      
  run:
    dir: outputs/time_comparison/${trainer.type}/${dataset.name}/${model.name}_np${model.n_patches}_rp${model.rank_pixel}
  sweep:
    dir: outputs/time_comparison
    subdir: ${trainer.type}/${dataset.name}/${model.name}_np${model.n_patches}_rp${model.rank_pixel}_seed${seed}
