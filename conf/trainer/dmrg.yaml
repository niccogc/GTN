# @package _global_
# DMRG: 2-site Density Matrix Renormalization Group Training
# Updates two adjacent nodes simultaneously, then SVD-splits them back.

trainer:
  type: dmrg
  n_epochs: 1000           # Number of training epochs
  
  # Ridge regularization (λ in ridge regression)
  lr: 0.005
  ridge: 5            # Regularization strength (used directly as jitter)
  ridge_decay: 0.25       # Multiplicative decay per epoch
  ridge_min: 0.0001        # Minimum ridge value
  
  # Early stopping
  patience: 100             # Epochs without improvement before stopping (null to disable)
  min_delta: 0.001        # Minimum improvement to count as progress
  
  # DMRG-specific SVD truncation
  max_bond: null
  cutoff: 1e-10            # Singular value cutoff for SVD truncation
