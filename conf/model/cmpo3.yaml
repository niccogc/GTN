# @package _global_

model:
  name: CMPO3
  L: 3
  n_patches: 4
  rank_channel: 4
  rank_pixel: 10
  rank_patch: 10
  init_strength: 0.01

hydra:
  run:
    dir: outputs/${trainer.type}/${dataset.name}/${model.name}/np${model.n_patches}_L${model.L}_rc${model.rank_channel}_rp${model.rank_pixel}_rpa${model.rank_patch}_seed${seed}
  sweep:
    subdir: np${model.n_patches}_L${model.L}_rc${model.rank_channel}_rp${model.rank_pixel}_rpa${model.rank_patch}_seed${seed}
