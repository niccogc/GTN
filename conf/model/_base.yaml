# @package _global_
# Base model configuration - inherited by all models

model:
  name: ???               # Set by specific model config
  L: 3                    # Number of sites (2-10)
  bond_dim: 6             # Bond dimension (4-20), override in sweeps
  output_site: null       # Output site (null = L-1)
  init_strength: 0.1      # Initialization scale

hydra:
  run:
    dir: outputs/${trainer.type}/${dataset.name}/${model.name}_rg${trainer.ridge}_init${model.init_strength}/L${model.L}_bd${model.bond_dim}_seed${seed}
  sweep:
    subdir: L${model.L}_bd${model.bond_dim}_seed${seed}
