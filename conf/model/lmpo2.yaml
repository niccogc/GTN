# @package _global_
defaults:
  - _base

model:
  name: LMPO2
  reduction_factor: 0.3
  reduced_dim: null
  bond_dim_mpo: 1

hydra:
  sweep:
    subdir: L${model.L}_bd${model.bond_dim}_seed${seed}_rf${model.reduction_factor}_bondmpo${model.bond_dim_mpo}
  sweeper:
    params:
      model.reduction_factor: 0.3,0.5,0.9
