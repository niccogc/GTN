# @package _global_
# Time comparison experiment: NTN vs GTN on MNIST with CMPO2
# Usage:
#   python run.py +experiment=time_comparison trainer=ntn
#   python run.py +experiment=time_comparison trainer=gtn

defaults:
  - override /model: cmpo2
  - override /dataset: mnist

model:
  L: 3
  n_patches: 4
  rank_pixel: 10
  rank_patch: 10
  init_strength: 0.01

dataset:
  batch_size: 512
  n_train: 5000
  n_val: 1000
  n_test: 1000

skip_completed: false
