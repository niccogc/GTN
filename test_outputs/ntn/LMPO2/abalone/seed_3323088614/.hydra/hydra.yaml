hydra:
  run:
    dir: outputs/${trainer.type}/${dataset.name}/${model.name}_rg${trainer.ridge}_init${model.init_strength}/L${model.L}_bd${model.bond_dim}_seed${seed}_rf${model.reduction_factor}
  sweep:
    dir: test_outputs/${trainer.type}/${model.name}/${dataset.name}
    subdir: seed_${seed}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      model.reduction_factor: 0.3,0.5,0.9
      seed: 836578142, 895435625, 2631647123, 2487125586, 3323088614, 3313309148,
        3300558450, 4053540165, 2318036890, 4234260150
      trainer.ridge: '5'
      trainer.ridge_decay: '0.25'
      trainer.ridge_min: '0.0001'
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - model.reduction_factor=0.9
    - seed=3323088614
    - trainer.ridge=5
    - trainer.ridge_decay=0.25
    - trainer.ridge_min=0.0001
    - +experiment=test_ntn
    - model=lmpo2
    - dataset=abalone
  job:
    name: run
    chdir: false
    override_dirname: +experiment=test_ntn,dataset=abalone,model.reduction_factor=0.9,model=lmpo2,seed=3323088614,trainer.ridge=5,trainer.ridge_decay=0.25,trainer.ridge_min=0.0001
    id: '24'
    num: 24
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /zhome/6b/e/212868/GTN
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /zhome/6b/e/212868/GTN/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /zhome/6b/e/212868/GTN/test_outputs/ntn/LMPO2/abalone/seed_3323088614
    choices:
      experiment: test_ntn
      hpc: null
      slurm: null
      trainer: ntn
      dataset: abalone
      model: lmpo2
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
